<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Contact Us</title>
    <style>
        *{
            margin: 0;
            padding: 0;

        }
        body{
            font-family: sans-serif;
            overflow-x: hidden;
        }
        
        nav{
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 80px;
            background-color:rgb(0, 0, 0) ;
        }

        nav ul{
            display: flex;
            justify-content: center;
        }
        nav ul li{
            list-style: none;
            margin: 0 23px;
        }
        nav ul li a{
           text-decoration: none;
            color: white;
        }
        nav ul li a:hover{
            color: rgb(159, 66, 66);
            font-size: 1.02rem;
            
        }
        main hr{
            border: 0;
            background: rgb(73, 48, 173);
            height: 1px;
            margin: 40px 84px;
        }

        .left{
            font-size: 1.5rem;
            color: white;
        }
        .contact{
            width: 100vw;
            height: 100vh;
            background-color: rgb(0, 0, 0);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;

        }
        .contact::before{
            content: "";
            background-color: #fff;
            height: 100%;
            width: 100%;
            border-radius: 0 50%;
        }
        .contact form{
            position: absolute;
            display: flex;
            flex-direction: column;
            padding: 40px;
            border: 1px solid #666565;
            width: 30%;
            background-color: #000000;
        }
        .contact form input{
            margin: 5px;
            height: 18pt;
            font-size: 1.1rem;
            padding: 5px;
            border:1px solid #121213 ;
        }
        .contact form textarea{
            margin: 5px;
            font-size: 1.1rem;
            padding: 5px;
            border:1px solid #2c165e ;
        }
        .contact form button{
            align-self: start;
            padding: 8px 10px 8px 10px;
            background-color: rgb(232, 234, 231);
            color: rgb(31, 29, 29);
            border: 1px solid #fff;
            margin: 5px;
            
        }
        .contact form h2{
            padding: 0 0 10px 5px;
        }
        @media screen and (max-width: 768px){
            .contact form {
                width: 80%;
                padding: 20px;
            }
            .contact ::before{
                border-radius: 0 10%;
            }
            
        }
        footer{
                background-color: rgb(0, 0, 0);
               
            }
            .footer{
                display: flex;
                padding: 23px 122px;
                justify-content: space-evenly;
            }
            .footer h3{
                color: white;
            }
            .footer ul{

                list-style: none;
            }
            .footer > div {
                width: 223px;
            }
            footer .footer-rights{
                color: gray;
                text-align: center;
                padding: 12px 0;
            }


    </style>
</head>
